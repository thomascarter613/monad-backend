name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Run repository checks
        run: bun run check
